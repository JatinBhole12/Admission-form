<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(to right, #6a11cb, #2575fc);
            background-size: cover;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #fff;
            animation: fadeIn 0.5s ease-in;
        }
        .container {
            background-color: rgba(255, 255, 255, 0.9);
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            padding: 40px;
            width: 400px;
            text-align: center;
            backdrop-filter: blur(10px);
            transform: translateY(-30px);
            opacity: 0;
            animation: slideIn 0.5s forwards ease-in;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes slideIn {
            from { transform: translateY(-30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 24px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #333;
        }
        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }
        input:focus {
            border-color: #6a11cb;
            box-shadow: 0 0 5px rgba(106, 17, 203, 0.5);
            outline: none;
        }
        button {
            background-color: #6a11cb;
            color: white;
            border: none;
            border-radius: 5px;
            padding: 12px 20px;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.3s ease;
            margin-top: 15px;
            width: 100%;
            transform: scale(1);
            animation: buttonFadeIn 0.5s forwards ease-in;
        }
        @keyframes buttonFadeIn {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }
        button:hover {
            background-color: #2575fc;
            transform: translateY(-2px) scale(1.05);
        }
        .error-message {
            color: red;
            margin-top: 10px;
            font-size: 14px;
        }
        .footer {
            margin-top: 20px;
            font-size: 14px;
            color: #555;
        }
        .footer a {
            color: #6a11cb;
            text-decoration: none;
            transition: color 0.3s ease;
        }
        .footer a:hover {
            color: #2575fc;
        }
    </style>
</head>
<body>
    <div class="container">
        <form class="login-form" id="login-form">
            <h2>Admin Login</h2>
            <div class="input-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required>
            </div>
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>
            
            <button type="button" id="pay-btn" onclick="login()">Log In</button>
            <p class="error-message" id="error-message"></p>
        </form>
        <div class="footer">
            <p>Forgot your password? <a href="#">Reset it here</a></p>
        </div>
    </div>
    <script>
        function login() {
            window.location.href = 'jj.html'; // Change 'payment.html' to the path of your HTML file
        }

        document.getElementById('login-form').addEventListener('submit', function(event) {
            event.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorMessage = document.getElementById('error-message');

            if (username === '' || password === '') {
                errorMessage.textContent = 'Please fill in all fields.';
            } else {
                errorMessage.textContent = '';
                // Handle successful login here (e.g., send data to server)
                alert('Login successful!'); // Placeholder action
            }
        });
    </script>
</body>
</html>
