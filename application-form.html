<script>
    document.getElementById('photo-input').addEventListener('change', function(event) {
    const file = event.target.files[0];
    if (file) {
        const reader = new FileReader();
        
        reader.onload = function(e) {
            const img = document.getElementById('passport-photo');
            img.src = e.target.result;
            img.style.display = 'block'; // Show the image after loading
            document.getElementById('remove-photo').style.display = 'inline-block'; // Show the remove button
        }
        
        reader.readAsDataURL(file);
    }
});

document.getElementById('remove-photo').addEventListener('click', function() {
    const img = document.getElementById('passport-photo');
    img.src = ''; // Clear the image source
    img.style.display = 'none'; // Hide the image
    document.getElementById('photo-input').value = ''; // Clear the file input
    this.style.display = 'none'; // Hide the remove button
});
    function showCourseOptions(course) {
        const courseOptionSelect = document.getElementById('course-option');
        courseOptionSelect.innerHTML = '';

        if (course === 'B.Tech') {
            const options = [
                { value: 'CSE', text: 'Computer Science and Engineering' },
                { value: 'ECE', text: 'Electronics and Communication Engineering' },
                { value: 'ME', text: 'Mechanical Engineering' },
                { value: 'EE', text: 'Electrical Engineering'},
                { value: 'AI&DS', text: 'Artificial Intellegence & Data Science'},
            ];

            options.forEach((option) => {
                const optionElement = document.createElement('option');
                optionElement.value = option.value;
                optionElement.text = option.text;
                courseOptionSelect.appendChild(optionElement);
            });
        } else if (course === 'M.Tech') {
            const options = [
                { value: 'CSE', text: 'Computer Science and Engineering' },
                { value: 'ECE', text: 'Electronics and Communication Engineering' },
            ];

            options.forEach((option) => {
                const optionElement = document.createElement('option');
                optionElement.value = option.value;
                optionElement.text = option.text;
                courseOptionSelect.appendChild(optionElement);
            });
        } else if (course === 'MBA') {
            const options = [
                { value: 'Finance', text: 'Finance' },
                { value: 'Marketing', text: 'Marketing' },
                { value: 'HR', text: 'Human Resources' },
            ];

            options.forEach((option) => {
                const optionElement = document.createElement('option');
                optionElement.value = option.value;
                optionElement.text = option.text;
                courseOptionSelect.appendChild(optionElement);
            });
        }
    }

    document.getElementById('course-option').addEventListener('change', function() {
        const course = document.getElementById('course').value;
        const courseOption = document.getElementById('course-option').value;
        const courseInfo = `${course} - ${courseOption}`;
        document.getElementById('course-info').value = courseInfo;
    });
</script>
